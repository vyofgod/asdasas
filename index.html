<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reddish Eagle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

.container {
  width: 100%;
  max-width: 900px;
  text-align: center;
  position: relative;
}

.title {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: bold;
  margin-bottom: 35px;
  letter-spacing: 1px;
  color: #fff;
}

.red-line {
  color: #c40000;
  font-size: clamp(18px, 2.5vw, 28px);
  margin-bottom: 30px;
  text-shadow:
    0 0 6px rgba(255,0,0,0.7),
    0 0 12px rgba(255,0,0,0.4);
  animation: flicker 2s infinite;
}

.image-box {
  width: 100%;
  max-width: 400px;
  height: 400px;
  margin: 0 auto 35px;
  background: #000;
  border: 1px solid #333;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-box::before {
  content: "";
  position: absolute;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(10px);
}

.image-box::after {
  content: "NO SIGNAL";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.18);
  font-size: 34px;
  letter-spacing: 4px;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 60%;
  position: relative;
  z-index: 1;
}

.quote {
  font-size: clamp(14px, 2vw, 20px);
  margin-bottom: 20px;
  color: #ddd;
  line-height: 1.7;
}

.members {
  color: #bdbdbd;
  font-size: clamp(12px, 1.6vw, 16px);
  line-height: 1.9;
  margin-bottom: 40px;
  word-break: break-word;
}

.footer-red {
  color: #c40000;
  font-size: clamp(16px, 2vw, 22px);
  text-shadow: 0 0 8px rgba(255,0,0,0.6);
  animation: flicker 1.6s infinite;
}

.footer-small {
  margin-top: 12px;
  color: #a10000;
  font-size: clamp(13px, 1.6vw, 17px);
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    opacity: 1;
  }
  20%, 24%, 55% {
    opacity: 0.4;
  }
}

.audio-section {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  pointer-events: none;
  z-index: 10;
  max-width: 1600px;
  margin: 0 auto;
}

.audio-column {
  display: flex;
  flex-direction: column;
  gap: 15px;
  pointer-events: auto;
  align-items: center;
}

.screenshots-bottom {
  display: none;
}

.screenshot-box {
  width: 480px;
  height: auto;
  border: 1px solid rgba(196, 0, 0, 0.4);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(196, 0, 0, 0.2);
  transition: all 0.3s ease;
  background: rgba(0, 0, 0, 0.5);
  cursor: pointer;
}

.screenshot-box.fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 1200px;
  height: auto;
  z-index: 10000;
  border-color: rgba(196, 0, 0, 0.8);
  box-shadow: 0 0 30px rgba(196, 0, 0, 0.6);
}

.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 9999;
  cursor: pointer;
}

.overlay.active {
  display: block;
}

.screenshot-box:hover {
  border-color: rgba(196, 0, 0, 0.7);
  box-shadow: 0 0 15px rgba(196, 0, 0, 0.4);
}

.screenshot-box img {
  width: 100%;
  height: auto;
  display: block;
  opacity: 1;
  object-fit: contain;
}

.screenshot-box:hover img {
  opacity: 1;
  filter: brightness(1.1);
}

.audio-btn {
  padding: 10px 20px;
  background: rgba(10, 0, 0, 0.5);
  border: 1px solid #c40000;
  border-radius: 3px;
  color: #c40000;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px rgba(196, 0, 0, 0.2);
  display: flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
}

.audio-btn:hover {
  background: rgba(196, 0, 0, 0.2);
  border-color: #ff0000;
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
  color: #ff0000;
}

.audio-btn:active {
  transform: scale(0.95);
}

.audio-btn span {
  font-size: 14px;
}

  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="container">
    <div class="audio-section">
      <div class="audio-column">
        <button class="audio-btn" onclick="document.getElementById('audio1').play()">
          <span>▶</span> Ses 1
        </button>
        <div class="screenshot-box">
          <img src="Ekran görüntüsü 2026-04-07 011632.png" alt="screenshot 1">
        </div>
      </div>
      <div class="audio-column">
        <button class="audio-btn" onclick="document.getElementById('audio2').play()">
          <span>▶</span> Ses 2
        </button>
        <div class="screenshot-box">
          <img src="Ekran görüntüsü 2026-04-07 011706.png" alt="screenshot 2">
        </div>
      </div>
      <audio id="audio1" src="audio_2026-04-07_01-13-19.mp3"></audio>
      <audio id="audio2" src="audio_2026-04-07_01-13-24.mp3"></audio>
    </div>

    <div class="red-line">
  VyOfGod ~ ReoxenOfGod
</div>

<div class="image-box">
  <img src="https://i.ibb.co/bffmbKS/resim.png" alt="resim">
</div>

<div class="quote">
  "babanız biziz çünkü ananızı siktik"<br>
</div>

<div class="members">
  VyOfGod ~ ReoxenOfGod
</div>

<div class="footer-red">https://t.me/leakxturkey</div>
<div class="footer-small">~ görünürlük solup gider ama izler kalır ~</div>

  </div>

  <script>
    const screenshots = document.querySelectorAll('.screenshot-box');
    const overlay = document.getElementById('overlay');

    screenshots.forEach(screenshot => {
      screenshot.addEventListener('click', function(e) {
        e.stopPropagation();
        const img = this.querySelector('img');
        const imgClone = img.cloneNode(true);
        imgClone.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90vw; max-width: 1200px; height: auto; z-index: 10001; border: 2px solid #c40000; box-shadow: 0 0 30px rgba(196, 0, 0, 0.6); cursor: pointer;';
        imgClone.id = 'fullscreen-img';
        
        overlay.classList.add('active');
        document.body.appendChild(imgClone);
        
        imgClone.addEventListener('click', function() {
          this.remove();
          overlay.classList.remove('active');
        });
      });
    });

    overlay.addEventListener('click', function() {
      const fullscreenImg = document.getElementById('fullscreen-img');
      if (fullscreenImg) {
        fullscreenImg.remove();
      }
      overlay.classList.remove('active');
    });
  </script>
</body>
</html>
